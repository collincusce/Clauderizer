<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="How it works: markdown in docs is the source of truth; the engine rebuilds a disposable index and runs rituals; an MCP + hook surface exposes it; your agent just uses the tools.">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1 L8 5 L2 9" fill="none" stroke="#6E7681" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>.mono { font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace; }</style>
  </defs>
  <rect x="0" y="0" width="1000" height="300" rx="16" fill="#0E1117"/>
  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="600" fill="#C7CDD4">How it works</text>

  <!-- box 1: docs -->
  <rect x="24" y="78" width="212" height="132" rx="10" fill="#1A2029" stroke="#36424F" stroke-width="0.75"/>
  <text x="38" y="106" font-size="14.5" font-weight="700" fill="#E08A5E">docs/ — markdown</text>
  <text x="38" y="131" class="mono" font-size="11.5" fill="#8B949E">GAMEPLAN · DECISIONS</text>
  <text x="38" y="150" class="mono" font-size="11.5" fill="#8B949E">INVARIANTS · LESSONS</text>
  <text x="38" y="169" class="mono" font-size="11.5" fill="#8B949E">SKILLS · graph edges</text>
  <text x="38" y="196" font-size="11.5" font-style="italic" fill="#6E7681">the source of truth</text>

  <!-- box 2: engine -->
  <rect x="264" y="78" width="212" height="132" rx="10" fill="#161B22" stroke="#2A3340" stroke-width="0.75"/>
  <text x="278" y="106" font-size="14.5" font-weight="700" fill="#E08A5E">engine</text>
  <text x="278" y="131" class="mono" font-size="11.5" fill="#8B949E">rebuilds a disposable</text>
  <text x="278" y="150" class="mono" font-size="11.5" fill="#8B949E">graph index</text>
  <text x="278" y="169" class="mono" font-size="11.5" fill="#8B949E">cascade · preflight</text>
  <text x="278" y="196" font-size="11.5" font-style="italic" fill="#6E7681">rituals execute</text>

  <!-- box 3: surface -->
  <rect x="504" y="78" width="212" height="132" rx="10" fill="#161B22" stroke="#2A3340" stroke-width="0.75"/>
  <text x="518" y="106" font-size="14.5" font-weight="700" fill="#E08A5E">MCP + hooks</text>
  <text x="518" y="131" class="mono" font-size="11.5" fill="#8B949E">cz_* tool calls</text>
  <text x="518" y="150" class="mono" font-size="11.5" fill="#8B949E">SessionStart digest</text>
  <text x="518" y="169" class="mono" font-size="11.5" fill="#8B949E">analyze-on-prompt</text>
  <text x="518" y="196" font-size="11.5" font-style="italic" fill="#6E7681">self-describing</text>

  <!-- box 4: agent -->
  <rect x="744" y="78" width="212" height="132" rx="10" fill="#1A2029" stroke="#36424F" stroke-width="0.75"/>
  <text x="758" y="106" font-size="14.5" font-weight="700" fill="#E08A5E">your agent</text>
  <text x="758" y="131" class="mono" font-size="11.5" fill="#8B949E">Claude Code · Cursor</text>
  <text x="758" y="150" class="mono" font-size="11.5" fill="#8B949E">Copilot · Codex · Gemini</text>
  <text x="758" y="169" class="mono" font-size="11.5" fill="#8B949E">Windsurf · kimi · …</text>
  <text x="758" y="196" font-size="11.5" font-style="italic" fill="#6E7681">just uses the tools</text>

  <!-- arrows -->
  <line x1="240" y1="144" x2="260" y2="144" stroke="#6E7681" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="480" y1="144" x2="500" y2="144" stroke="#6E7681" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="720" y1="144" x2="740" y2="144" stroke="#6E7681" stroke-width="1.4" marker-end="url(#arr)"/>

  <text x="500" y="258" text-anchor="middle" font-size="13.5" fill="#8B949E">Markdown is the source of truth — the index is a disposable cache. If they ever disagree, <tspan fill="#C7CDD4" font-weight="600">markdown wins.</tspan></text>
  <text x="500" y="280" text-anchor="middle" font-size="12.5" fill="#6E7681">No database. No lock-in. Your memory is just readable files you can <tspan fill="#8B949E">git diff</tspan>.</text>
</svg>
