<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 384" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Same agent, same repo: without Clauderizer every session re-onboards; with it, the agent already knows where things stand.">
  <rect x="0" y="0" width="1000" height="384" rx="16" fill="#0E1117"/>
  <text x="500" y="44" text-anchor="middle" font-size="20" font-weight="600" fill="#C7CDD4">Same agent. Same repo. One of them remembers.</text>

  <!-- WITHOUT -->
  <rect x="24" y="72" width="464" height="288" rx="12" fill="#14181F" stroke="#2A3340"/>
  <text x="48" y="108" font-size="12" font-weight="700" letter-spacing="1.5" fill="#8B949E">WITHOUT CLAUDERIZER</text>
  <g font-size="14" fill="#AEB6BF">
    <g transform="translate(0,150)"><circle cx="60" cy="-5" r="11" fill="#241718" stroke="#8B4A45"/><path d="M55 -10 l10 10 M65 -10 l-10 10" stroke="#E5685C" stroke-width="2" stroke-linecap="round"/><text x="82" y="0">You re-explain the architecture. Again.</text></g>
    <g transform="translate(0,198)"><circle cx="60" cy="-5" r="11" fill="#241718" stroke="#8B4A45"/><path d="M55 -10 l10 10 M65 -10 l-10 10" stroke="#E5685C" stroke-width="2" stroke-linecap="round"/><text x="82" y="0">A decision from an hour ago — contradicted.</text></g>
    <g transform="translate(0,246)"><circle cx="60" cy="-5" r="11" fill="#241718" stroke="#8B4A45"/><path d="M55 -10 l10 10 M65 -10 l-10 10" stroke="#E5685C" stroke-width="2" stroke-linecap="round"/><text x="82" y="0">"Wait… did we already build this?"</text></g>
    <g transform="translate(0,294)"><circle cx="60" cy="-5" r="11" fill="#241718" stroke="#8B4A45"/><path d="M55 -10 l10 10 M65 -10 l-10 10" stroke="#E5685C" stroke-width="2" stroke-linecap="round"/><text x="82" y="0">The plan drifts from reality, silently.</text></g>
  </g>
  <text x="48" y="344" font-size="13" font-style="italic" fill="#6E7681">every session starts from zero</text>

  <!-- WITH -->
  <rect x="512" y="72" width="464" height="288" rx="12" fill="#181E26" stroke="#3A4350"/>
  <text x="536" y="108" font-size="12" font-weight="700" letter-spacing="1.5" fill="#E08A5E">WITH CLAUDERIZER</text>
  <g font-size="14" fill="#D5DBE2">
    <g transform="translate(0,150)"><circle cx="548" cy="-5" r="11" fill="#13241A" stroke="#2E6B3A"/><path d="M543 -5 l4 4 l7 -8" fill="none" stroke="#57C24A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="570" y="0">The digest greets the agent — cold.</text></g>
    <g transform="translate(0,198)"><circle cx="548" cy="-5" r="11" fill="#13241A" stroke="#2E6B3A"/><path d="M543 -5 l4 4 l7 -8" fill="none" stroke="#57C24A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="570" y="0">Decisions &amp; invariants surfaced, not re-derived.</text></g>
    <g transform="translate(0,246)"><circle cx="548" cy="-5" r="11" fill="#13241A" stroke="#2E6B3A"/><path d="M543 -5 l4 4 l7 -8" fill="none" stroke="#57C24A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="570" y="0">"Phase 3 of 5 — preflight green, building."</text></g>
    <g transform="translate(0,294)"><circle cx="548" cy="-5" r="11" fill="#13241A" stroke="#2E6B3A"/><path d="M543 -5 l4 4 l7 -8" fill="none" stroke="#57C24A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="570" y="0">The plan is the live state.</text></g>
  </g>
  <text x="536" y="344" font-size="13" font-weight="600" fill="#E08A5E">every session is momentum →</text>
</svg>
