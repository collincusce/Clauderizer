name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # B2 (D-012): the suite must be green on all three OSes, and the win32
    # cells EXECUTE the native cmd wrapper for real (D3) — not a
    # platform-monkeypatched simulation.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python ${{ matrix.python }}
      - run: uv pip install -e ".[mcp,dev]"
      - run: uv run pytest -q
