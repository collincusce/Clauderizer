name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # B2 (D-012): the suite must be green on all three OSes, and the win32
    # cells EXECUTE the native cmd wrapper for real (D3) — not a
    # platform-monkeypatched simulation.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      # Provision uv from PyPI via setup-python, not astral-sh/setup-uv: setup-uv
      # resolves its version through the GitHub API, which returned intermittent
      # 503s and failed every matrix cell; pip has no such dependency.
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install uv
      - run: uv venv --python ${{ matrix.python }}
      - run: uv pip install -e ".[mcp,dev]"
      - run: uv run pytest -q
