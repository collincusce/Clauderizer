name: Publish to PyPI

# Publishes when you cut a GitHub Release. Uses PyPI Trusted Publishing (OIDC) —
# no API token or secret is stored anywhere. Configure the trusted publisher once
# on PyPI (see "Publishing" in the README): project `clauderizer`, owner
# `collincusce`, repo `Clauderizer`, workflow `publish.yml`, environment `pypi`.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # H-07 guard: a Release whose tag disagrees with the tagged tree's
      # version builds the WRONG artifacts and fails later as an opaque PyPI
      # duplicate (seen live: v0.7.0 cut from a 0.6.0-source commit). Refuse
      # up front, naming both versions.
      - name: Release tag must match pyproject version
        run: |
          python3 - <<'EOF'
          import os, sys, tomllib
          with open("pyproject.toml", "rb") as fh:
              src = tomllib.load(fh)["project"]["version"]
          tag = os.environ.get("GITHUB_REF_NAME", "")
          if tag.removeprefix("v") != src:
              sys.exit(f"refusing to publish: Release tag is '{tag}' but the tagged "
                       f"tree's pyproject.toml declares {src} — retag the actual "
                       f"release commit, or fix the version and re-release (H-07)")
          print(f"ok: tag {tag} matches source version {src}")
          EOF
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/clauderizer
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
